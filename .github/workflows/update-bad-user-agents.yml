name: Update Bad User Agents

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v1
        with:
          enable-cache: true

      - run: uv run nginx-snippet-generator.py

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bad_user_agents.map
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "chore: update bad_user_agents.map"
            git push
          fi
